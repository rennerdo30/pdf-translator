name: Bug Report
description: Report a reproducible bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: List exact steps needed to reproduce.
      placeholder: |
        1. Run command ...
        2. Open file ...
        3. Observe error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / Traceback
      description: Paste any relevant logs or stack traces.
      render: shell
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. macOS 14, Ubuntu 22.04, Windows 11
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python Version
      placeholder: e.g. 3.11.8
    validations:
      required: true
  - type: input
    id: model
    attributes:
      label: Model / Provider
      placeholder: e.g. qwen2.5-vl via LM Studio
